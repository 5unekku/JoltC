name: Test Suite

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  test-suite:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Debug, Release]
        build_flags: ['', '-DDOUBLE_PRECISION=ON', '-DOBJECT_LAYER_BITS=32']

    runs-on: ${{ matrix.os }}
    name: Tests - ${{ matrix.os }} ${{ matrix.build_type }} ${{ matrix.build_flags }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install Clang (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get install -y clang

    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      run: cmake -B build ${{ matrix.build_flags }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -GNinja -DINTERPROCEDURAL_OPTIMIZATION=OFF ${{ runner.os == 'Linux' && '-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++' || '' }}

    - name: Build
      run: cmake --build build

    - name: Run Hello World
      shell: bash
      run: ./build/HelloWorld

  completeness:
    runs-on: ubuntu-latest
    name: API Completeness

    steps:
    - uses: actions/checkout@v6

    - name: Check all declared functions are implemented
      run: python3 check_completeness.py
